<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta id="meta-description" name="description" content="Research project page">
    <meta id="meta-keywords" name="keywords" content="research, project page">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Page</title>

    <link
      href="https://fonts.googleapis.com/css?family=Google+Sans:400,500,700|Noto+Sans:400,500,700|Castoro:400"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    >
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"
    >
    <link rel="stylesheet" href="static/css/index.css">
    <script defer src="static/js/index.js"></script>
  </head>

  <body>
    <nav class="navbar is-white" role="navigation" aria-label="main navigation">
      <div class="container is-max-desktop">
        <div class="navbar-brand">
          <a class="navbar-item brand-title" href="#top" id="brand-title">Project Page</a>
          <a
            role="button"
            class="navbar-burger"
            aria-label="menu"
            aria-expanded="false"
            data-target="page-navbar"
          >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="page-navbar" class="navbar-menu">
          <div class="navbar-start">
            <a class="navbar-item" href="#abstract-section">Abstract</a>
            <a class="navbar-item" href="#method-section">Method</a>
            <a class="navbar-item" href="#results-section">Results</a>
            <a class="navbar-item" href="#citation-section">BibTeX</a>
          </div>
          <div class="navbar-end">
            <a class="navbar-item" href="#" id="home-link">
              <span class="icon"><i class="fas fa-home"></i></span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <section class="hero publication-hero" id="top">
      <div class="hero-body">
        <div class="container is-max-desktop">
          <div class="columns is-centered">
            <div class="column has-text-centered">
              <h1 class="title is-1 publication-title" id="project-title">Project Title</h1>
              <h2 class="title is-3 publication-subtitle" id="project-subtitle">
                Project subtitle
              </h2>

              <div class="is-size-5 publication-authors" id="authors"></div>
              <div class="is-size-5 publication-authors">
                <span class="author-block institution-line" id="institution">
                  Institution
                </span>
              </div>

              <div class="column has-text-centered">
                <div class="publication-links" id="links"></div>
              </div>

              <div class="columns is-centered media-row">
                <div class="column is-four-fifths">
                  <div class="hero-media-shell" id="video-shell">
                    <div class="placeholder">
                      Link a YouTube/Vimeo embed or add a local MP4 in `static/videos/`.
                    </div>
                  </div>
                </div>
              </div>

              <p class="media-caption" id="video-caption"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="abstract-section">
      <div class="container is-max-desktop">
        <div class="columns is-centered has-text-centered">
          <div class="column is-four-fifths">
            <h2 class="title is-3">Abstract</h2>
            <div class="content has-text-justified">
              <p id="abstract"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section section-accent" id="method-section">
      <div class="container is-max-desktop">
        <div class="columns is-centered has-text-centered">
          <div class="column is-full">
            <h2 class="title is-3">Navigation Transformer</h2>
            <div class="content has-text-justified">
              <div class="pdf-shell method-shell">
                <img
                  class="method-figure"
                  src="static/images/MultimodalNavTransformerCurr.png"
                  alt="Multimodal Navigation Transformer figure"
                >
              </div>
              <p class="method-description" id="navigation-transformer"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="results-section">
      <div class="container is-max-desktop">
        <div class="columns is-centered has-text-centered">
          <div class="column is-full">
            <h2 class="title is-3">Results</h2>
            <div class="results-viewer" id="gallery"></div>
            <div class="results-controls has-text-centered" id="results-controls" hidden>
              <button class="button is-dark is-rounded results-arrow" id="results-prev" type="button" aria-label="Previous video">
                <span aria-hidden="true">&#8592;</span>
              </button>
              <div class="results-dots" id="results-dots" aria-label="Results video index"></div>
              <button class="button is-dark is-rounded results-arrow" id="results-next" type="button" aria-label="Next video">
                <span aria-hidden="true">&#8594;</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="citation-section">
      <div class="container is-max-desktop content">
        <h2 class="title is-3">BibTeX</h2>
        <pre><code id="bibtex"></code></pre>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="content has-text-centered">
          <p id="footer-note">
            This webpage template is inspired by Nerfies-style academic project pages.
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
