
# global params for diffusion model
# normalized min and max
action_stats:
  min: [-2.5, -4] # [min_dx, min_dy]
  max: [5, 4] # [max_dx, max_dy]

# data specific params
recon:
  metric_waypoint_spacing: 0.25 # average spacing between waypoints (meters)

  # OPTIONAL (FOR VISUALIZATION ONLY)
  camera_metrics: # https://docs.opencv.org/4.x/dc/dbb/tutorial_py_calibration.html
    camera_height: 0.95 # meters
    camera_x_offset: 0.45 # distance between the center of the robot and the forward facing camera
    camera_matrix:
      fx: 272.547000
      fy: 266.358000
      cx: 320.000000
      cy: 220.000000
    dist_coeffs:
      k1: -0.038483
      k2: -0.010456
      p1: 0.003930
      p2: -0.001007
      k3: 0.0
  robot: # Jackal
    lidar_height: 0.0
    v_max: 2.0
    w_max: 2.0
    al_max: 3.0
    ar_max: 6.0
    height: 0.25
    width: 0.43
    length: 0.508
    ground_clearance: 0.045
    weight: 17.0
    max_speed: 3.5423 # m/s
    max_yaw_rate: 25.769  # deg/s
    max_acceleration: 3.835
    min_turn_radius: 0.0
    median_turn_radius: 54.547 # deg
    lidar_transform:
      rotation:
        w: 1.0
        x: 0.0
        y: 0.0
        z: 0.0
      translation:
        x: 0.0
        y: 0.0
        z: 0.0

